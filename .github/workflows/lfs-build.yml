name: LFS Build Simulation v2
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Simulate CF Pages git clone
        run: |
          echo "=== ORACLE_START ==="
          echo "Cloning repo (simulates CF Pages build environment)..."
          git clone https://github.com/GraoMelo/lfs-capture-poc.git repo
          cd repo
          echo "=== .lfsconfig ==="
          cat .lfsconfig 2>/dev/null || echo "NO_LFSCONFIG"
          echo "=== .gitmodules ==="
          cat .gitmodules 2>/dev/null || echo "NO_GITMODULES"
          echo "=== Git LFS version ==="
          git lfs version
          echo "=== Git config (LFS) ==="
          git config --list | grep -i lfs || echo "NO_LFS_CONFIG"
          echo "=== Running git lfs pull (THIS reads .lfsconfig) ==="
          git lfs pull 2>&1 || echo "LFS_PULL_FAILED"
          echo "=== ORACLE_END ==="
